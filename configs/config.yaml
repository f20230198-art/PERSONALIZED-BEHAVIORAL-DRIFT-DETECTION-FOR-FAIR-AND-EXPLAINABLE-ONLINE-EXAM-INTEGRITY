# Experimental Configuration for Behavioral Drift Detection

# Data Settings
data:
  ednet_path: "EdNet-KT2/KT2"
  oulad_path: "archive"
  processed_path: "data/processed"
  synthetic_path: "data/synthetic"
  num_students: 15000  # Load 15K (up from 5K) for stronger model
  session_min_questions: 20
  session_max_questions: 50
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  synthetic_contamination: 0.15  # 15% anomaly injection — more signal for threshold optimization

# Feature Engineering
features:
  - response_time_mean
  - response_time_std
  - answer_change_rate
  - keystroke_rhythm_variance
  - pause_frequency
  - question_sequence_deviation
  - response_time_entropy
  - speed_score
  - burst_ratio
  - response_time_iqr

# Model: LSTM Autoencoder
# NOTE: Smaller capacity forces the bottleneck to be selective about what
# it encodes. A too-large AE reconstructs everything (including anomalies)
# equally well, destroying the reconstruction-error gap we rely on.
model:
  name: "LSTMAutoencoder"
  input_dim: 10  # Number of features (6 original + 4 new)
  hidden_dim: 96    # enough capacity to learn normal patterns well
  latent_dim: 32    # wider bottleneck improves normal reconstruction quality
  num_layers: 2
  dropout: 0.2
  bidirectional: false
  max_seq_len: 50

# Model: Transformer Autoencoder (alternative sequence model)
transformer:
  name: "TransformerAutoencoder"
  input_dim: 10
  d_model: 96       # matched to LSTM hidden_dim for fair comparison
  nhead: 4          # 96/4 = 24 per head
  num_layers: 2
  latent_dim: 32    # matched to LSTM latent_dim
  max_seq_len: 50
  dropout: 0.2

# Training
training:
  batch_size: 32
  epochs: 300  # More epochs for larger model to converge
  learning_rate: 0.001
  optimizer: "Adam"
  loss: "MSE"
  early_stopping_patience: 30  # more patience for larger model
  weight_decay: 0.0001
  gradient_clip: 1.0
  device: "cuda"
  seed: 42

# In-processing fairness (adversarial demographic invariance)
fairness_training:
  enabled: false        # Disabled: gradient reversal degrades reconstruction quality
  attribute: "gender"   # Primary protected attribute for adversarial training
  lambda: 0.1           # Weight of adversarial loss
  warmup_epochs: 10     # Train reconstruction-only first, then ramp up fairness

# Drift Detection
drift:
  threshold_method: "dynamic"  # or "fixed"
  percentile: 95  # For dynamic thresholding
  fairness_calibration: true

# Fairness Settings (post-hoc calibration — complements in-processing)
fairness:
  sensitive_attributes:
    - gender
    - age_band
    - imd_band
    - disability
  metrics:
    - demographic_parity_ratio
    - equalized_odds_difference
  threshold_adjustment_alpha: 0.1
  dp_threshold: 0.80  # Min acceptable ratio
  eo_threshold: 0.10  # Max acceptable difference

# Explainability
explainability:
  method: "SHAP"
  kernel_explainer_samples: 200  # Up from 100 for better approximation
  top_features: 5
  aggregation_level: ["question", "feature"]

# Baselines
baselines:
  - name: "RuleBased"
    thresholds:
      response_time_min: 5.0  # seconds — flag if mean RT < 5s (subtle anomalies compress by 2-5x)
      answer_change_max: 0.8  # flag if answer_change_rate > 0.8 per question (normal ~0.1-0.3)
      burst_ratio_max: 0.95   # flag if > 95% of actions under 2s apart
  - name: "IsolationForest"
    contamination: 0.15
    n_estimators: 100
  - name: "OneClassSVM"
    kernel: "rbf"
    nu: 0.15
  - name: "StandardAutoencoder"
    hidden_dims: [48, 16, 48]

# Output
output:
  models_dir: "results/models"
  plots_dir: "results/plots"
  metrics_dir: "results/metrics"
  save_checkpoints: true
  checkpoint_frequency: 10  # epochs
